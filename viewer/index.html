<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>star-dump</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", sans-serif;
        background: #04070d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(54, 83, 140, 0.35), transparent 35%),
          radial-gradient(circle at bottom, rgba(214, 148, 69, 0.18), transparent 30%),
          #04070d;
        color: #ebf3ff;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Shared card style */
      .hud, #corner-info {
        position: absolute;
        padding: 9px 11px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 10px;
        background: rgba(4, 7, 13, 0.82);
        backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .hud {
        top: 14px;
        left: 14px;
        width: 290px;
      }

      #corner-info {
        top: 14px;
        right: 14px;
        min-width: 200px;
        pointer-events: none;
      }

      /* HUD header row */
      .hud-header {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .hud h1 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .nodes-inline {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .nodes-lbl {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.5);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .nodes-inline #lod-bar {
        flex: 1;
        width: auto;
        margin: 0;
      }

      .nodes-inline code {
        font: inherit;
        font-size: 10px;
        color: rgba(235, 243, 255, 0.85);
        white-space: nowrap;
        flex-shrink: 0;
        width: 36px;
        text-align: right;
      }

      /* Status */
      .hud .status {
        margin: 0;
        font-size: 10px;
        line-height: 1.3;
        color: rgba(235, 243, 255, 0.5);
        min-height: 1em;
      }

      /* Tabs */
      .tab-btns {
        display: flex;
        gap: 3px;
        margin-top: 2px;
      }

      .tab-btn {
        flex: 1;
        font: inherit;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.4);
        background: transparent;
        border: 1px solid rgba(159, 184, 222, 0.12);
        border-radius: 4px;
        padding: 3px 0;
        cursor: pointer;
      }

      .tab-btn.active {
        color: rgba(235, 243, 255, 0.85);
        border-color: rgba(159, 184, 222, 0.3);
        background: rgba(159, 184, 222, 0.08);
      }

      .tab-content {
        display: none;
        flex-direction: column;
        gap: 3px;
        margin-top: 2px;
      }

      .tab-content.active {
        display: flex;
      }

      /* Info rows */
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 4px;
      }

      .info-row .lbl {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.5);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .info-row code {
        font: inherit;
        font-size: 10px;
        color: rgba(235, 243, 255, 0.85);
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Select rows */
      .select-row {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .select-row label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.5);
        white-space: nowrap;
        flex-shrink: 0;
        width: 50px;
      }

      .hud select {
        flex: 1;
        font: inherit;
        font-size: 10px;
        color: #ebf3ff;
        padding: 2px 5px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.06);
      }

      /* Progress bar */
      #lod-bar {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        margin: 1px 0 3px;
        background: #1e2d42;
        display: flex;
        overflow: hidden;
      }
      #lod-cached {
        height: 100%;
        background: #9fb8de;
        width: 0%;
        transition: width 0.3s;
        flex-shrink: 0;
      }
      #lod-inflight {
        height: 100%;
        background: #3e6496;
        width: 0%;
        transition: width 0.3s;
        flex-shrink: 0;
      }

      /* Slider rows */
      .slider-row {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .slider-row label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.5);
        white-space: nowrap;
        flex-shrink: 0;
        width: 80px;
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .hud input[type="range"] {
        flex: 1;
        height: 12px;
        accent-color: #9fb8de;
        cursor: pointer;
        min-width: 0;
      }

      .slider-row code {
        font: inherit;
        font-size: 10px;
        color: rgba(235, 243, 255, 0.85);
        white-space: nowrap;
        flex-shrink: 0;
        width: 46px;
        text-align: right;
      }

      /* Tooltip "i" badge */
      .tip {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: rgba(159, 184, 222, 0.22);
        color: rgba(235, 243, 255, 0.65);
        font-size: 7px;
        font-style: italic;
        font-weight: 700;
        text-transform: none;
        letter-spacing: 0;
        cursor: default;
        flex-shrink: 0;
        line-height: 1;
      }

      .tip::after {
        content: attr(data-tip);
        display: none;
        position: absolute;
        left: calc(100% + 7px);
        top: 50%;
        transform: translateY(-50%);
        background: rgba(6, 12, 26, 0.97);
        border: 1px solid rgba(159, 184, 222, 0.28);
        border-radius: 7px;
        padding: 8px 10px;
        font: 400 11px/1.5 "IBM Plex Sans", sans-serif;
        color: rgba(235, 243, 255, 0.88);
        width: 210px;
        white-space: normal;
        z-index: 200;
        pointer-events: none;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
        text-transform: none;
        letter-spacing: 0;
        font-weight: 400;
      }

      .tip:hover::after { display: block; }

      #minimap-wrap {
        position: absolute;
        bottom: 14px;
        right: 14px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 10px;
        overflow: hidden;
        pointer-events: none;
        display: none;
      }

      #minimap-canvas {
        display: block !important;
        width: auto !important;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="minimap-wrap"><canvas id="minimap-canvas"></canvas></div>
      <div id="corner-info">
        <div class="info-row">
          <span class="lbl">FPS</span>
          <code id="fps">--</code>
        </div>
        <div class="info-row">
          <span class="lbl">Chunks</span>
          <code id="chunk-count">0</code>
        </div>
        <div class="info-row">
          <span class="lbl">Position (pc)</span>
          <code id="coordinates">0.00, 0.00, 0.00</code>
        </div>
        <div class="info-row">
          <span class="lbl">Speed</span>
          <code id="speed">0c</code>
        </div>
      </div>
      <div class="hud">
        <div class="hud-header">
          <h1>star-dump</h1>
          <div class="nodes-inline">
            <span class="nodes-lbl">NODES</span>
            <div id="lod-bar"><div id="lod-cached"></div><div id="lod-inflight"></div></div>
            <code id="query-count">0</code>
          </div>
        </div>
        <p id="status" class="status"></p>
        <div class="tab-btns">
          <button class="tab-btn active" data-tab="data">Data</button>
          <button class="tab-btn" data-tab="display">Display</button>
        </div>
        <div class="tab-content active" id="tab-data">
          <div class="select-row">
            <label for="api-select">URL</label>
            <select id="api-select"></select>
          </div>
          <div class="select-row">
            <label for="dataset-select">Dataset</label>
            <select id="dataset-select"></select>
          </div>
        </div>
        <div class="tab-content" id="tab-display">
          <div class="slider-row">
            <label for="far-slider">Far<span class="tip" data-tip="Maximum render distance in parsecs. Stars beyond this are clipped from the view frustum.">i</span></label>
            <input type="range" id="far-slider" min="5" max="5000" step="5" value="500">
            <code id="far-value">500 pc</code>
          </div>
          <div class="slider-row">
            <label for="exposure-slider">Exposure<span class="tip" data-tip="Overall brightness multiplier. Higher reveals faint stars but overexposes bright ones.">i</span></label>
            <input type="range" id="exposure-slider" min="0" max="100" step="1" value="50">
            <code id="exposure-value">1.0e+0</code>
          </div>
          <div class="slider-row">
            <label for="size-scale-slider">Size scale<span class="tip" data-tip="Scales how much a star's brightness maps to its radius. Lower values shrink all stars; higher values enlarge them.">i</span></label>
            <input type="range" id="size-scale-slider" min="0.1" max="10" step="0.1" value="2">
            <code id="size-scale-value">2.0</code>
          </div>
          <div class="slider-row">
            <label for="max-radius-slider">Max radius<span class="tip" data-tip="Maximum star radius in pixels. Caps the brightest stars so they don't grow too large.">i</span></label>
            <input type="range" id="max-radius-slider" min="1" max="16" step="0.5" value="8">
            <code id="max-radius-value">8.0 px</code>
          </div>
          <div class="slider-row">
            <label for="pixel-threshold-slider">Pixel thr<span class="tip" data-tip="LOD cut-off in pixels. When a node's sky footprint is smaller than this, its precomputed subsample is used instead of descending. Higher = faster but coarser detail.">i</span></label>
            <input type="range" id="pixel-threshold-slider" min="1" max="16" step="1" value="8">
            <code id="pixel-threshold-value">8 px</code>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./dist/main.js"></script>
    <script>new EventSource('/esbuild').addEventListener('change', () => location.reload())</script>
  </body>
</html>
