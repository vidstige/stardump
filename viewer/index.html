<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gaia Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", sans-serif;
        background: #04070d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(54, 83, 140, 0.35), transparent 35%),
          radial-gradient(circle at bottom, rgba(214, 148, 69, 0.18), transparent 30%),
          #04070d;
        color: #ebf3ff;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: absolute;
        top: 24px;
        left: 24px;
        max-width: 320px;
        padding: 14px 16px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 12px;
        background: rgba(4, 7, 13, 0.72);
        backdrop-filter: blur(18px);
      }

      .hud h1 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud p {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        color: rgba(235, 243, 255, 0.78);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="hud">
        <h1>Gaia Viewer</h1>
        <p>1000 random stars, rendered with regl. Click to capture the mouse, move with WASD, look with the mouse.</p>
      </div>
    </div>
    <script src="./dist/main.js"></script>
  </body>
</html>
