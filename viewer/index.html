<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gaia Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", sans-serif;
        background: #04070d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(54, 83, 140, 0.35), transparent 35%),
          radial-gradient(circle at bottom, rgba(214, 148, 69, 0.18), transparent 30%),
          #04070d;
        color: #ebf3ff;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: absolute;
        top: 24px;
        left: 24px;
        max-width: 320px;
        padding: 14px 16px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 12px;
        background: rgba(4, 7, 13, 0.72);
        backdrop-filter: blur(18px);
      }

      .hud h1 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud p {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        color: rgba(235, 243, 255, 0.78);
      }

      .hud .meta {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .hud .field {
        display: grid;
        gap: 4px;
      }

      .hud label,
      .hud .label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(235, 243, 255, 0.56);
      }

      .hud code,
      .hud select {
        width: 100%;
        font: inherit;
        font-size: 13px;
        color: #ebf3ff;
      }

      .hud code {
        display: block;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        overflow-wrap: anywhere;
      }

      .hud select {
        padding: 8px 10px;
        border: 1px solid rgba(159, 184, 222, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="hud">
        <h1>Gaia Viewer</h1>
        <p id="status">Loading dataset...</p>
        <p id="details">Click to capture the mouse, move with WASD, look with the mouse.</p>
        <div class="meta">
          <div class="field">
            <div class="label">API Base URL</div>
            <code id="api-root"></code>
          </div>
          <div class="field">
            <label for="dataset-select">Dataset</label>
            <select id="dataset-select"></select>
          </div>
        </div>
      </div>
    </div>
    <script src="./dist/main.js"></script>
    <script>new EventSource('/esbuild').addEventListener('change', () => location.reload())</script>
  </body>
</html>
